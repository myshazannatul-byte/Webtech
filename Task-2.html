<!DOCTYPE html>
<head>
    <title>Registration</title>
    <body>
        <table>
            <tr>
                <h1>Registration</h1>
                <td>
                    <fieldset>

                        <legend>General Information:</legend>

                        <label for="fname">First Name: </label>
                        <input type="text" id="fname" name="fname"><br><br />

                        <label for="lname">Last Name: </label>
                        <input type="text" id="lname" name="lname"><br><br />

                        <label for>Gender: </label>
                        <input type="radio" name="gender" value="male">
                        <label for="male">Male</label>
                        <input type="radio" name="gender" value="female">
                        <label for="male">Female</label>
                        <br /><br />

                        <label>Father's Name:<input for="text" /> </label>   <input type="file"> <br />
                        <br />
                        <label>Mother's Name: <input for="text" </label><br>
                        <br />
                        <label>Blood Group: </label>
                        <select name: BG+->
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>O+</option>
                            <option>O-</option>

                        </select> <br />
                        <br />

                        <label>Religion: </label>
                        <select name:Religion>
                            <option>Islam</option>
                            <option>Hindu</option>
                            <option>Christian</option>

                        </select>
                        <br />


                    </fieldset>
                    </td>
                <td>
                    <fieldset>
                        <legend>Contact Information:</legend>

                        <label for="email">Email:</label>
                        <input type="text"><br /><br />

                        <label>Phone/Mobile:</label>
                        <input type="text"><br /><br />

                        <label>Website:</label>
                        <input type="text"><br /><br />

                        <label>Address:</label>
                        <fieldset>
                            <legend>Present Address</legend>
                            <select name=Country>
                                <option>Bangladesh</option>
                                <option>Germany</option>
                                <option>Australia</option>
                                <option>Nepal</option>
                                <option>New york</option>
                                <option>Norway</option>
                            </select>
                            <select name=City>
                                <option>Dhaka</option>
                                <option>Queens</option>
                                <option>Delhi</option>
                                <option>Amserdom</option>
                                <option>Berlin</option>
                                <option>Karachi</option>
                            </select> <br /><br />

                            <textarea id="address" name="address" rows="4" cols="50" placeholder="Road/Street/City" /></textarea>  <br />
                            <input type="text" placeholder="Post Code" /><br />
                        </fieldset>
                    </fieldset>
                </td>

                <td>
                    <fieldset>
                        <legend>Account Information:</legend>

                        <label>Username:</label>
                        <input type="text"><br /><br />

                        <label>Password:</label>
                        <input type="password"><br /><br />

                        <label>Confirm Password:</label>
                        <input type="password"><br /><br />

                    </fieldset>
                    <br /><br />
                    <button>Register</button>
                </td>

                
            
            </tr>
        </table>
    </body>


</head>
